<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>软件授权</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #1a1d23;
        color: #e8eaed;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .panel {
        width: 100%;
        max-width: 520px;
        background: #252830;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      .hint {
        color: #9aa0a6;
        font-size: 13px;
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        color: #bdc1c6;
      }
      .machine-row {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .machine-row input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #3c4043;
        border-radius: 8px;
        background: #1a1d23;
        color: #e8eaed;
        font-family: monospace;
        font-size: 13px;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 14px;
      }
      .btn-copy {
        background: #3c4043;
        color: #fff;
      }
      .btn-copy:hover {
        background: #5f6368;
      }
      .auth-input {
        width: 100%;
        padding: 12px;
        border: 1px solid #3c4043;
        border-radius: 8px;
        background: #1a1d23;
        color: #e8eaed;
        font-size: 14px;
        margin-bottom: 16px;
        resize: vertical;
        min-height: 80px;
      }
      .btn-primary {
        width: 100%;
        background: #8ab4f8;
        color: #1a1d23;
        font-weight: 600;
      }
      .btn-primary:hover {
        background: #aecbfa;
      }
      .msg {
        margin-top: 12px;
        font-size: 13px;
        min-height: 20px;
      }
      .msg.err {
        color: #f28b82;
      }
      .msg.ok {
        color: #81c995;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>软件授权</h1>
      <p class="hint">请将下方设备标识发送给管理员获取授权码，填写后点击确认激活。</p>
      <label>设备标识（MAC / Machine ID）</label>
      <div class="machine-row">
        <input id="machineId" type="text" readonly />
        <button type="button" class="btn-copy" id="copyBtn">复制</button>
      </div>
      <label>授权码</label>
      <textarea id="authCode" class="auth-input" placeholder="请输入授权码"></textarea>
      <button type="button" class="btn-primary" id="confirmBtn">确认</button>
      <p id="message" class="msg"></p>
    </div>
    <script>
      const machineInput = document.getElementById('machineId');
      const authInput = document.getElementById('authCode');
      const messageEl = document.getElementById('message');
      function getHttpPort() {
        const port = new URLSearchParams(window.location.search).get('httpPort');
        const parsed = port ? parseInt(port, 10) : NaN;
        return Number.isFinite(parsed) && parsed > 0 ? parsed : 8081;
      }

      function getApiBase() {
        return 'http://127.0.0.1:' + getHttpPort();
      }

      function unwrapBody(json) {
        return json && json.data !== undefined ? json.data : json;
      }

      function setMessage(text, isError) {
        messageEl.textContent = text || '';
        messageEl.className = 'msg' + (text ? (isError ? ' err' : ' ok') : '');
      }

      async function initPage() {
        try {
          const res = await fetch(getApiBase() + '/system_api/getMachineId');
          const json = await res.json();
          const body = unwrapBody(json);
          if (body.code === 200 && body.data) {
            machineInput.value = body.data;
          } else {
            setMessage(body.message || '无法读取设备标识', true);
          }
        } catch (e) {
          setMessage('无法连接本地服务，请确认应用已启动', true);
        }
      }

      document.getElementById('copyBtn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(machineInput.value);
          setMessage('已复制到剪贴板', false);
        } catch (e) {
          setMessage('复制失败，请手动选择复制', true);
        }
      });

      document.getElementById('confirmBtn').addEventListener('click', async () => {
        const authCode = authInput.value.trim();
        if (!authCode) {
          setMessage('请输入授权码', true);
          return;
        }
        setMessage('正在校验...', false);
        try {
          const res = await fetch(getApiBase() + '/system_api/checkAuth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ authCode: authCode }),
          });
          const json = await res.json();
          const body = unwrapBody(json);
          if (body.code === 200) {
            const api = window.electronAPI;
            if (!api || typeof api.invoke !== 'function') {
              setMessage('授权成功，但无法连接主程序接口', true);
              return;
            }
            setMessage('正在保存授权...', false);
            const saveResult = await api.invoke('license:save', authCode);
            if (!saveResult.ok) {
              setMessage(saveResult.message || '保存授权失败', true);
              return;
            }
            const enterResult = await api.invoke('license:enter-app');
            if (!enterResult.ok) {
              setMessage(enterResult.message || '进入应用失败', true);
              return;
            }
            setMessage(body.message || '授权成功', false);
          } else {
            setMessage(body.message || '授权失败', true);
          }
        } catch (e) {
          setMessage('请求失败，请确认 HTTP 服务已启动', true);
        }
      });

      initPage();
    </script>
  </body>
</html>
